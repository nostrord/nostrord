name: Release

# Triggers:
#   - Tag push matching v*  → real release.
#   - workflow_dispatch     → manual fallback for re-runs / debugging.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # Needed to create / update the GitHub Release.

jobs:
  android-release:
    name: Build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # Decode the base64-encoded keystore secret into a temp file on the
      # runner. The runner is ephemeral; the file is destroyed at job end.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          test -s "$RUNNER_TEMP/release.jks"

      # Write keystore.properties so the existing gradle signingConfig finds
      # the keystore + creds without needing CI-only branches in build.gradle.kts.
      - name: Generate keystore.properties
        run: |
          cat > keystore.properties <<'EOF'
          storeFile=${{ runner.temp }}/release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build signed APK
        run: ./gradlew :composeApp:assembleRelease --no-daemon

      # Sanity check — fingerprint must match the local keystore. If this
      # fails (or signature is missing), abort before publishing.
      - name: Verify APK signature
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner"
          "$APKSIGNER" verify --print-certs \
            composeApp/build/outputs/apk/release/composeApp-release.apk

      - name: Rename artifacts with version tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          mkdir -p dist
          cp composeApp/build/outputs/apk/release/composeApp-release.apk \
             "dist/nostrord-${VERSION}.apk"
          ls -la dist

      # Uploaded on every run so workflow_dispatch builds can be downloaded
      # and tested without creating a tag/release.
      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: dist/*
          retention-days: 7

      # Upload APK to the GitHub Release. Skipped on workflow_dispatch
      # (manual runs are for build verification, not publishing).
      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Always remove the keystore credentials file even if the build failed.
      - name: Clean up keystore artifacts
        if: always()
        run: |
          rm -f keystore.properties "$RUNNER_TEMP/release.jks" || true

  # Builds unsigned desktop installers for Linux, macOS, and Windows.
  # On workflow_dispatch the artifacts are uploaded for download/testing only;
  # publishing to a GitHub Release happens exclusively on a v* tag push.
  desktop-release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux .deb
            task: ':composeApp:fixDebPackage'
            artifact_glob: 'composeApp/build/compose/binaries/main/deb/*.deb'
            ext: deb
            platform: linux-amd64
          - os: ubuntu-latest
            label: Linux .rpm
            task: ':composeApp:packageRpm'
            artifact_glob: 'composeApp/build/compose/binaries/main/rpm/*.rpm'
            ext: rpm
            platform: linux-amd64
          - os: macos-latest
            label: macOS .dmg
            task: ':composeApp:packageDmg'
            artifact_glob: 'composeApp/build/compose/binaries/main/dmg/*.dmg'
            ext: dmg
            platform: macos-arm64
          - os: windows-latest
            label: Windows .msi
            task: ':composeApp:packageMsi'
            artifact_glob: 'composeApp/build/compose/binaries/main/msi/*.msi'
            ext: msi
            platform: windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # rpmbuild is not installed on ubuntu-latest by default; jpackage
      # invokes it under the hood when building the .rpm.
      - name: Install rpmbuild
        if: matrix.ext == 'rpm'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build installer
        run: ./gradlew ${{ matrix.task }} --no-daemon

      - name: Rename artifact with version tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          mkdir -p dist
          cp ${{ matrix.artifact_glob }} \
             "dist/nostrord-${VERSION}-${{ matrix.platform }}.${{ matrix.ext }}"
          ls -la dist

      # Uploaded on every run so workflow_dispatch builds can be downloaded
      # and tested without creating a tag/release.
      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.ext }}
          path: dist/*
          retention-days: 7

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

  zapstore-publish:
    name: Publish to Zapstore
    runs-on: ubuntu-latest
    needs: android-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install zsp
        run: |
          ZSP_URL=$(curl -fsSL https://api.github.com/repos/zapstore/zsp/releases/latest \
            | grep browser_download_url | grep linux-amd64 | cut -d'"' -f4)
          curl -fsSL "$ZSP_URL" -o /usr/local/bin/zsp
          chmod +x /usr/local/bin/zsp

      - name: Publish to Zapstore
        env:
          SIGN_WITH: ${{ secrets.ZAPSTORE_SIGN_WITH }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zsp publish -y -verbose -skip-certificate-linking zapstore.yaml

  arch-pkg:
    name: Build Arch .pkg.tar.zst
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build .deb
        run: ./gradlew :composeApp:fixDebPackage --no-daemon

      - name: Build .pkg.tar.zst
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi

          DEB=$(ls composeApp/build/compose/binaries/main/deb/*.deb)
          mkdir -p pkgbuild
          cp "$DEB" "pkgbuild/nostrord-${VERSION}.deb"

          cat > pkgbuild/PKGBUILD <<PKGEOF
          pkgname=nostrord-bin
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Nostr NIP-29 group messaging client"
          arch=('x86_64')
          url="https://github.com/Nostrord/nostrord"
          license=('MIT')
          provides=('nostrord')
          conflicts=('nostrord')
          depends=('libxtst' 'libxrender' 'fontconfig' 'freetype2')
          source=("nostrord-\${pkgver}.deb")
          sha256sums=('SKIP')

          package() {
              cd "\${srcdir}"
              bsdtar -xf "nostrord-\${pkgver}.deb" data.tar.xz 2>/dev/null \
                  || bsdtar -xf "nostrord-\${pkgver}.deb" data.tar.gz 2>/dev/null \
                  || bsdtar -xf "nostrord-\${pkgver}.deb" data.tar.zst
              bsdtar -xf data.tar.* -C "\${pkgdir}"

              local desktop_src="\${pkgdir}/opt/nostrord/lib/nostrord-Nostrord.desktop"
              if [[ -f "\${desktop_src}" ]]; then
                  install -Dm644 "\${desktop_src}" \
                      "\${pkgdir}/usr/share/applications/nostrord.desktop"
              fi

              install -Dm755 /dev/stdin "\${pkgdir}/usr/bin/nostrord" <<'LAUNCHER'
          #!/bin/sh
          exec /opt/nostrord/bin/Nostrord "\$@"
          LAUNCHER
          }
          PKGEOF

          docker run --rm \
            -v "$(pwd)/pkgbuild":/pkg \
            archlinux:latest bash -c '
              pacman -Sy --noconfirm base-devel libxtst libxrender fontconfig freetype2
              useradd -m builder
              chown -R builder:builder /pkg
              su builder -c "cd /pkg && makepkg --nodeps --noconfirm --noprogressbar"
            '

          mkdir -p dist
          cp "pkgbuild/nostrord-bin-${VERSION}-1-x86_64.pkg.tar.zst" \
             "dist/nostrord-${VERSION}-linux-amd64.pkg.tar.zst"

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          gpg --list-secret-keys

      - name: Sign package
        run: |
          set -euo pipefail
          PKG=$(ls dist/*.pkg.tar.zst)
          gpg --batch --yes \
              --local-user "${{ secrets.GPG_KEY_ID }}" \
              --detach-sign --no-armor \
              "$PKG"
          ls -la dist/

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: arch-pkg
          path: dist/*
          retention-days: 7

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.pkg.tar.zst
            dist/*.pkg.tar.zst.sig
          fail_on_unmatched_files: true

  # Pushes an updated PKGBUILD to the AUR (nostrord-bin) after the Linux .deb
  # has been published to the GitHub Release. The action regenerates .SRCINFO
  # in an Arch container and pushes via SSH.
  aur-publish:
    name: Publish to AUR
    runs-on: ubuntu-latest
    needs: desktop-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download .deb from release and compute sha256
        id: hash
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.v }}"
          URL="https://github.com/${{ github.repository }}/releases/download/v${VER}/nostrord-${VER}-linux-amd64.deb"
          for i in 1 2 3 4 5 6; do
            if curl -fsSL -o nostrord.deb "$URL"; then break; fi
            echo "retry $i: release asset not yet available"
            sleep 10
          done
          test -s nostrord.deb
          SHA=$(sha256sum nostrord.deb | awk '{print $1}')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Stage PKGBUILD
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.v }}"
          SHA="${{ steps.hash.outputs.sha }}"
          mkdir -p aur-stage
          cp packaging/aur/nostrord-bin.install aur-stage/nostrord-bin.install
          cat > aur-stage/PKGBUILD <<PKGEOF
          # Maintainer: Anderson Juhasc <anjhc@proton.me>
          pkgname=nostrord-bin
          pkgver=${VER}
          pkgrel=1
          pkgdesc="Nostr NIP-29 group messaging client"
          arch=('x86_64')
          url="https://github.com/Nostrord/nostrord"
          license=('Unlicense')
          provides=('nostrord')
          conflicts=('nostrord')
          depends=('libxtst' 'libxrender' 'fontconfig' 'freetype2')
          install=nostrord-bin.install
          source=("nostrord-\${pkgver}.deb::https://github.com/Nostrord/nostrord/releases/download/v\${pkgver}/nostrord-\${pkgver}-linux-amd64.deb")
          sha256sums=('${SHA}')

          package() {
            cd "\${srcdir}"

            # Extract .deb data archive
            bsdtar -xf "nostrord-\${pkgver}.deb" data.tar.xz 2>/dev/null ||
              bsdtar -xf "nostrord-\${pkgver}.deb" data.tar.gz 2>/dev/null ||
              bsdtar -xf "nostrord-\${pkgver}.deb" data.tar.zst
            bsdtar -xf data.tar.* -C "\${pkgdir}"

            # Move .desktop to the standard location
            local desktop_src="\${pkgdir}/opt/nostrord/lib/nostrord-Nostrord.desktop"
            if [[ -f "\${desktop_src}" ]]; then
              install -Dm644 "\${desktop_src}" \\
                "\${pkgdir}/usr/share/applications/nostrord.desktop"
            fi

            # Launcher wrapper at /usr/bin
            install -Dm755 /dev/stdin "\${pkgdir}/usr/bin/nostrord" <<'EOF'
          #!/bin/sh
          exec /opt/nostrord/bin/Nostrord "\$@"
          EOF
          }
          PKGEOF
          ls -la aur-stage

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: nostrord-bin
          pkgbuild: aur-stage/PKGBUILD
          assets: aur-stage/nostrord-bin.install
          commit_username: Anderson Juhasc
          commit_email: anjhc@proton.me
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "upgpkg: nostrord-bin ${{ steps.ver.outputs.v }}-1"
