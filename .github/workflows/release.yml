name: Release

# Triggers:
#   - Tag push matching v*  → real release.
#   - workflow_dispatch     → manual fallback for re-runs / debugging.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # Needed to create / update the GitHub Release.

jobs:
  android-release:
    name: Build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # Decode the base64-encoded keystore secret into a temp file on the
      # runner. The runner is ephemeral; the file is destroyed at job end.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          test -s "$RUNNER_TEMP/release.jks"

      # Write keystore.properties so the existing gradle signingConfig finds
      # the keystore + creds without needing CI-only branches in build.gradle.kts.
      - name: Generate keystore.properties
        run: |
          cat > keystore.properties <<'EOF'
          storeFile=${{ runner.temp }}/release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build signed APK
        run: ./gradlew :composeApp:assembleRelease --no-daemon

      # Sanity check — fingerprint must match the local keystore. If this
      # fails (or signature is missing), abort before publishing.
      - name: Verify APK signature
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner"
          "$APKSIGNER" verify --print-certs \
            composeApp/build/outputs/apk/release/composeApp-release.apk

      - name: Rename artifacts with version tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          mkdir -p dist
          cp composeApp/build/outputs/apk/release/composeApp-release.apk \
             "dist/nostrord-${VERSION}.apk"
          ls -la dist

      # Uploaded on every run so workflow_dispatch builds can be downloaded
      # and tested without creating a tag/release.
      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: dist/*
          retention-days: 7

      # Upload APK to the GitHub Release. Skipped on workflow_dispatch
      # (manual runs are for build verification, not publishing).
      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Always remove the keystore credentials file even if the build failed.
      - name: Clean up keystore artifacts
        if: always()
        run: |
          rm -f keystore.properties "$RUNNER_TEMP/release.jks" || true

  # Builds unsigned desktop installers for Linux, macOS, and Windows.
  # On workflow_dispatch the artifacts are uploaded for download/testing only;
  # publishing to a GitHub Release happens exclusively on a v* tag push.
  desktop-release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux .deb
            task: ':composeApp:fixDebPackage'
            artifact_glob: 'composeApp/build/compose/binaries/main/deb/*.deb'
            ext: deb
            platform: linux-amd64
          - os: macos-latest
            label: macOS .dmg
            task: ':composeApp:packageDmg'
            artifact_glob: 'composeApp/build/compose/binaries/main/dmg/*.dmg'
            ext: dmg
            platform: macos-arm64
          - os: windows-latest
            label: Windows .msi
            task: ':composeApp:packageMsi'
            artifact_glob: 'composeApp/build/compose/binaries/main/msi/*.msi'
            ext: msi
            platform: windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build installer
        run: ./gradlew ${{ matrix.task }} --no-daemon

      - name: Rename artifact with version tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          mkdir -p dist
          cp ${{ matrix.artifact_glob }} \
             "dist/nostrord-${VERSION}-${{ matrix.platform }}.${{ matrix.ext }}"
          ls -la dist

      # Uploaded on every run so workflow_dispatch builds can be downloaded
      # and tested without creating a tag/release.
      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.platform }}
          path: dist/*
          retention-days: 7

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
