name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Spotless check
        run: ./gradlew spotlessCheck

      - name: Detekt (dead-code gate)
        run: ./gradlew detekt

      - name: Compile (JVM)
        run: ./gradlew compileKotlinJvm

      - name: Compile (JS / web)
        run: ./gradlew compileKotlinJs

      - name: JVM tests
        run: ./gradlew :composeApp:jvmTest
