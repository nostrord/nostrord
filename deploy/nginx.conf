# Nginx configuration for Nostrord web app
# Optimized for maximum performance with WASM and large font files
#
# Usage:
#   1. Copy this to /etc/nginx/sites-available/nostrord
#   2. Create symlink: ln -s /etc/nginx/sites-available/nostrord /etc/nginx/sites-enabled/
#   3. Update server_name and root path
#   4. Test: nginx -t
#   5. Reload: systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # SSL configuration (update paths)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Root directory - update to your build output path
    root /var/www/nostrord/composeApp/build/dist/wasmJs/productionExecutable;
    index index.html;

    # ============================================
    # Gzip/Brotli Compression
    # ============================================

    # Enable gzip for dynamic compression fallback
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/wasm
        font/ttf
        font/woff
        font/woff2
        image/svg+xml;

    # Prefer pre-compressed files (.gz, .br)
    gzip_static on;
    brotli_static on;  # Requires ngx_brotli module

    # ============================================
    # MIME Types
    # ============================================

    # Ensure WASM has correct MIME type
    types {
        application/wasm wasm;
    }

    # ============================================
    # Cache Headers
    # ============================================

    # WASM files - immutable, cache forever
    location ~* \.wasm$ {
        add_header Content-Type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Embedder-Policy "require-corp";
        add_header Cross-Origin-Opener-Policy "same-origin";
    }

    # Font files - immutable, cache forever
    location ~* \.(ttf|woff|woff2|otf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # JS/CSS files - cache with revalidation (filenames may change)
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images - long cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # HTML - no cache (always fresh)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Service Worker - no cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ============================================
    # Security Headers
    # ============================================

    # Required for SharedArrayBuffer (WASM threads)
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # General security
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # SPA Routing
    # ============================================

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # WebSocket Proxy (optional - for relay proxy)
    # ============================================

    # Uncomment if you want to proxy WebSocket connections
    # location /relay/ {
    #     proxy_pass wss://relay.damus.io;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_read_timeout 86400;
    # }
}
